name: 'gh-readme2rtf-docx-txt'
description: 'Convert GitHub-Flavored Markdown to RTF, DOCX, and TXT based on settings'

inputs:
  config:
    description: 'Path to settings JSON file'
    required: false
    default: 'gh-readme2rtf-docx-txt-settings.json'

runs:
  using: 'composite'
  steps:
    - name: Install Python dependencies
      shell: bash
      run: pip install pygments pillow

    - name: Convert README files
      shell: python
      env:
        CONFIG_PATH: ${{ inputs.config }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        import json
        import os
        import subprocess
        import sys

        config_path = os.environ['CONFIG_PATH']
        action_path = os.environ['ACTION_PATH']

        converter_script = os.path.join(action_path, 'gh-readme2rtf-docx-txt.py')
        embedder_script = os.path.join(action_path, 'rtf_image_embedder.py')

        with open(config_path) as f:
            config = json.load(f)

        for entry in config.get('files', []):
            input_file = entry['input']
            formats = entry.get('output_formats', ['rtf'])
            base_name = input_file.rsplit('.', 1)[0]

            if 'rtf' in formats:
                rtf_path = base_name + '.rtf'
                print(f'Converting {input_file} -> {rtf_path}')
                subprocess.run([sys.executable, converter_script, input_file, rtf_path], check=True)
                subprocess.run([sys.executable, embedder_script, rtf_path], check=True)

            if 'docx' in formats:
                docx_path = base_name + '.docx'
                print(f'Converting {input_file} -> {docx_path}')
                subprocess.run([sys.executable, converter_script, input_file, docx_path], check=True)

            if 'txt' in formats:
                txt_path = base_name + '.txt'
                print(f'Converting {input_file} -> {txt_path}')
                subprocess.run([sys.executable, converter_script, input_file, txt_path], check=True)
